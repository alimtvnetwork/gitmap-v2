run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosec
    - gocritic
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive
    - gosimple
    - unconvert
    - unparam
    - nolintlint
    - bodyclose
    - errname
    - errorlint
    - exhaustive
    - copyloopvar
    - usestdlibvars
    - wastedassign

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
    exclude-functions:
      - (*flag.FlagSet).Parse
      - fmt.Scanln
      - (*encoding/json.Encoder).Encode
      - (*encoding/csv.Writer).Write

  gosec:
    excludes:
      - G104
      - G204
      - G304
      - G306
      - G401
      - G404
      - G505
      - G101

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
      - rangeValCopy
      - unnamedResult
      - emptyStringTest
      - tooManyResultsChecker
      - exitAfterDefer
      - appendCombine
      - ifElseChain
      - builtinShadow
      - redundantSprint
      - httpNoBody

  revive:
    rules:
      - name: blank-imports
        disabled: true
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: increment-decrement
      - name: var-declaration
      - name: package-comments
        disabled: true

  misspell:
    locale: US

  exhaustive:
    default-signifies-exhaustive: true

  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam
    - path: _test\.go
      text: "unusedwrite|nilness"
      linters:
        - govet
    - path: cmd/
      linters:
        - unparam
