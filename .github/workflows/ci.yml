name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Go vet
        working-directory: gitmap
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: gitmap
          args: --timeout=5m

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: gitmap
        run: govulncheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Run tests
        working-directory: gitmap
        shell: bash
        run: |
          set -uo pipefail
          set +e
          go test ./... -v -count=1 2>&1 | tee test-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "  FAILED TESTS & BUILD ERRORS"
            echo "========================================="
            if ! grep -E -A 20 '^(--- FAIL:|FAIL[[:space:]]|# )|build failed|cannot |undefined:|imported and not used|syntax error' test-output.txt; then
              echo "No focused matches found; showing last 200 lines."
              tail -n 200 test-output.txt
            fi
            echo "========================================="
            exit "$exit_code"
          fi

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Build binary
        working-directory: gitmap
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT="gitmap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags "-s -w" -o "$OUTPUT" .
          echo "Built $OUTPUT ($(stat -c%s "$OUTPUT" 2>/dev/null || stat -f%z "$OUTPUT") bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitmap-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gitmap/gitmap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
