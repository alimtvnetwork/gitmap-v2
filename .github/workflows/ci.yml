name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Go vet
        working-directory: gitmap
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: gitmap
          args: --timeout=5m

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: gitmap
        run: |
          set +e
          govulncheck ./... 2>&1 | tee /tmp/vulncheck.out
          rc=$?
          if [ $rc -ne 0 ]; then
            if grep -q "packages you import" /tmp/vulncheck.out | grep -v "0 vulnerabilities in packages"; then
              echo "::error::Third-party vulnerabilities detected"
              exit 1
            fi
            echo "::warning::Only stdlib vulnerabilities found (no fix available in current Go version)"
          fi

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            packages: ./clonenext/... ./cloner/... ./cmd/... ./config/... ./formatter/... ./mapper/... ./release/...
          - name: store
            packages: ./tests/store_test/...
          - name: integration
            packages: ./tests/cmd_test/... ./tests/constants_test/... ./tests/release_test/...
          - name: tui
            packages: ./tui/...
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Run tests
        working-directory: gitmap
        shell: bash
        run: |
          set -uo pipefail
          set +e
          go test ${{ matrix.packages }} -v -count=1 2>&1 | tee test-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "  FAILED TESTS (${{ matrix.name }})"
            echo "========================================="
            grep -E -A 5 '^--- FAIL:' test-output.txt || true
            echo "========================================="
          fi

          exit "$exit_code"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.name }}
          path: gitmap/test-output.txt
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: results

      - name: Aggregate failures
        shell: bash
        run: |
          echo "========================================="
          echo "  ALL TEST RESULTS"
          echo "========================================="

          overall=0
          for dir in results/test-results-*; do
            suite=$(basename "$dir" | sed 's/test-results-//')
            file="$dir/test-output.txt"
            if [ ! -f "$file" ]; then
              continue
            fi

            pass=$(grep -c '^--- PASS:' "$file" || true)
            fail=$(grep -c '^--- FAIL:' "$file" || true)

            if [ "$fail" -gt 0 ]; then
              echo ""
              echo "❌ $suite: $fail failed, $pass passed"
              echo "-----------------------------------------"
              grep -E -A 5 '^--- FAIL:' "$file" || true
              overall=1
            else
              echo "✅ $suite: $pass passed"
            fi
          done

          echo ""
          echo "========================================="

          if [ "$overall" -ne 0 ]; then
            echo "::error::Some test suites failed — see details above."
            exit 1
          fi

          echo "All test suites passed."

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test-summary
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Build binary
        working-directory: gitmap
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT="gitmap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags "-s -w" -o "$OUTPUT" .
          echo "Built $OUTPUT ($(stat -c%s "$OUTPUT" 2>/dev/null || stat -f%z "$OUTPUT") bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitmap-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gitmap/gitmap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
