name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sha-check:
    name: Check if already built
    runs-on: ubuntu-latest
    outputs:
      already-built: ${{ steps.cache-check.outputs.cache-hit }}
    steps:
      - name: Check SHA cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}
          lookup-only: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: sha-check
    if: needs.sha-check.outputs.already-built != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Go vet
        working-directory: gitmap
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: gitmap
          args: --timeout=5m

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: sha-check
    if: needs.sha-check.outputs.already-built != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: gitmap
        run: |
          set +e
          govulncheck ./... 2>&1 | tee /tmp/vulncheck.out
          rc=$?
          if [ $rc -ne 0 ]; then
            if grep -q "packages you import" /tmp/vulncheck.out | grep -v "0 vulnerabilities in packages"; then
              echo "::error::Third-party vulnerabilities detected"
              exit 1
            fi
            echo "::warning::Only stdlib vulnerabilities found (no fix available in current Go version)"
          fi

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [sha-check, lint]
    if: needs.sha-check.outputs.already-built != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            packages: ./clonenext/... ./cloner/... ./cmd/... ./config/... ./formatter/... ./mapper/... ./release/...
          - name: store
            packages: ./tests/store_test/...
          - name: integration
            packages: ./tests/cmd_test/... ./tests/constants_test/... ./tests/release_test/...
          - name: tui
            packages: ./tui/...
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Run tests
        working-directory: gitmap
        shell: bash
        run: |
          set -uo pipefail
          set +e
          go test ${{ matrix.packages }} -v -count=1 -coverprofile=coverage-${{ matrix.name }}.out -covermode=atomic 2>&1 | tee test-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "  FAILED TESTS (${{ matrix.name }})"
            echo "========================================="
            grep -E -A 5 '^--- FAIL:' test-output.txt || true
            echo "========================================="
          fi

          exit "$exit_code"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.name }}
          path: |
            gitmap/test-output.txt
            gitmap/coverage-${{ matrix.name }}.out
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [sha-check, test]
    if: always() && needs.sha-check.outputs.already-built != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: results

      - name: Aggregate failures
        shell: bash
        run: |
          echo "========================================="
          echo "  ALL TEST RESULTS"
          echo "========================================="

          overall=0
          for dir in results/test-results-*; do
            suite=$(basename "$dir" | sed 's/test-results-//')
            file="$dir/test-output.txt"
            if [ ! -f "$file" ]; then
              continue
            fi

            pass=$(grep -c '^--- PASS:' "$file" || true)
            fail=$(grep -c '^--- FAIL:' "$file" || true)

            if [ "$fail" -gt 0 ]; then
              echo ""
              echo "❌ $suite: $fail failed, $pass passed"
              echo "-----------------------------------------"
              grep -E -A 5 '^--- FAIL:' "$file" || true
              overall=1
            else
              echo "✅ $suite: $pass passed"
            fi
          done

          echo ""
          echo "========================================="

          if [ "$overall" -ne 0 ]; then
            echo "::error::Some test suites failed — see details above."
            exit 1
          fi

          echo "All test suites passed."

      - name: Coverage report
        if: always()
        working-directory: gitmap
        shell: bash
        run: |
          echo ""
          echo "========================================="
          echo "  COVERAGE BY PACKAGE"
          echo "========================================="

          # Merge all coverage profiles
          echo "mode: atomic" > combined-coverage.out
          for f in ../results/test-results-*/coverage-*.out; do
            if [ -f "$f" ]; then
              grep -v '^mode:' "$f" >> combined-coverage.out 2>/dev/null || true
            fi
          done

          if [ "$(wc -l < combined-coverage.out)" -le 1 ]; then
            echo "No coverage data collected."
            exit 0
          fi

          # Per-package breakdown
          go tool cover -func=combined-coverage.out | \
            awk '
              /^total:/ { total=$NF; next }
              {
                pkg=$1; sub(/\/[^/]+$/, "", pkg)
                if (!(pkg in seen)) { seen[pkg]=1; order[++n]=pkg }
                split($NF, a, "%"); pct[pkg] += a[1]; cnt[pkg]++
              }
              END {
                for (i=1; i<=n; i++) {
                  p = order[i]
                  avg = pct[p] / cnt[p]
                  printf "  %-55s %5.1f%%\n", p, avg
                }
                printf "\n  %-55s %s\n", "Total", total
              }
            '

          echo "========================================="

  mark-success:
    name: Mark SHA as built
    runs-on: ubuntu-latest
    needs: [sha-check, test-summary, vulncheck]
    if: success() && needs.sha-check.outputs.already-built != 'true'
    steps:
      - name: Write marker
        run: mkdir -p /tmp/ci-passed && echo "${{ github.sha }}" > /tmp/ci-passed/sha.txt

      - name: Save to cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}

